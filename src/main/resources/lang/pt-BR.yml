      - "&6Ajuda dos comandos de rede:"
      - "&6/networks help - Mostra essa mensagem de ajuda."
      - "&6/networks fillquantum <quantidade> - Preenche a quantidade armazenada do armazenamento quântico na mão."
      - "&6/networks fixblueprint <keyInMeta> - Repara a planta de criação na mão."
      - "&6/networks addstorageitem <quantidade> - Adiciona itens à gaveta de rede mirada."
      - "&6/networks reducestorageitem <quantidade> - Remove itens da gaveta de rede mirada."
      - "&6/networks setquantum <quantidade> - Define a quantidade armazenada do armazenamento quântico mirado."
      - "&6/networks setcontainerid <containerId> - Define o ID do contêiner da gaveta de rede."
      - "&6/networks worldedit <subComando> - Funções do WorldEdit do Slimefun."
      - "&6/networks updateitem - Atualiza o item na mão."
      - "&6/networks getstorageitem <slot> - Obtém o item do slot especificado da gaveta de rede mirada."
      - "&6/networks viewlog - Exibe o log do AdminDebuggable mirado."
    example:
      help:
        - "&6/networks help - Mostra essa mensagem de ajuda."
        - "&6ex: /networks help"
      fillquantum:
        - "&6/networks fillQuantum <amount> - Define a quantidade armazenada do armazenamento quântico na mão."
        - "&6ex: /networks fillQuantum 1000"
      fixblueprint:
        - "&6/networks fixBlueprint <keyInMeta> - Repara a planta de criação na mão."
        - "&6ex: /networks fixBlueprint networks-changed"
      addstorageitem:
        - "&6/networks addStorageItem <amount> - Adiciona a quantidade especificada do item na mão ao armazenamento de carga mirado."
        - "&6ex: /networks addstorageItem 1000"
      reducestorageitem:
        - "&6/networks reduceStorageItem <amount> - Remove a quantidade especificada do item na mão do armazenamento de carga mirado."
        - "&6ex: /networks reduceStorageItem 1000"
      setquantum:
        - "&6/networks setQuantum <amount> - Define o item do armazenamento quântico mirado como o item na mão, com a quantidade especificada."
        - "&6ex: /networks setQuantum 1000"
      setcontainerid:
        - "&6/networks setContainerId <containerId> - Define o ID do contêiner do armazenamento de carga mirado."
        - "&6ex: /networks setContainerId 6"
      getstorageitem:
        - "&6/networks getStorageItem <slot> - Obtém o item do slot especificado do armazenamento de carga mirado."
        - "&6ex: /networks getStorageItem 0"
      worldedit:
        - "&6/networks worldedit <subComando> - Funções do WorldEdit do Slimefun."
        - "&6/networks worldedit pos1 - Seleciona a primeira posição"
        - "&6/networks worldedit pos2 - Seleciona a segunda posição"
        - "&6/networks worldedit paste <sfid> <handler> <force> - Cola um bloco do Slimefun"
        - "&6/networks worldedit clear <callHandler> <skipVanilla> - Remove um bloco do Slimefun"
        - "&6/networks worldedit blockMenu setSlot <slot> - Define o slot correspondente do menu do bloco Slimefun na área selecionada como o item na mão"
        - "&6/networks worldedit blockInfo add <key> <value> - Adiciona informação ao bloco do Slimefun"
        - "&6/networks worldedit blockInfo remove <value> - Remove informação do bloco do Slimefun"
        - "&6/networks worldedit blockInfo set <key> <value> - Define informação do bloco do Slimefun"
        - "&6/networks worldedit clone - Copia a área selecionada pra sua posição"
        - "&6/networks worldedit clearPos - Limpa a posição selecionada"
        - "&6/networks worldedit showAreaOutline - Mostra o contorno da área selecionada"
      updateitem:
        - "&6/networks updateItem - Atualiza o item na mão."
        - "&6ex: /networks updateItem"
      viewlog:
        - "&6/networks viewLog - Exibe o log do AdminDebuggable mirado."
        - "&6ex: /networks viewLog"
